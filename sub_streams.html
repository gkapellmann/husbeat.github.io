<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Husbeat | Streams</title>

    <link href="./static/bootstrap.min.css" rel="stylesheet">
    <link href="./static/style.css" rel="stylesheet">
    <link href="./static/streaming.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="shortcut icon" href="./media/HusbeatHead.png">

</head>

<body class="subpage">

    <div id="header-placeholder"></div>

    <div class="site-wrapper">
        <div class="container my-5">
            <h3>Latest Content</h3>
            <div class="row">

                <div class="col-md-6 mb-4">
                    <h5>YouTube</h5>
                    <div class="ratio ratio-16x9 shadow-sm">                        
                        <iframe src="https://www.youtube.com/embed/videoseries?list=UUWNKIQ8aKCzeD4Z6SYxOoyA"
                                title="Husbeat YouTube"
                                frameborder="0"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                allowfullscreen>
                        </iframe>
                    </div>
                </div>

                <div class="col-md-6 mb-4">
                    <h5>Twitch Live</h5>
                    <div class="ratio ratio-16x9 shadow-sm">
                        <iframe src="https://player.twitch.tv/?channel=Husbeat_Dj&parent=husbeat.com" allowfullscreen></iframe>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>

        const channelID = "UCWNKIQ8aKCzeD4Z6SYxOoyA";
        fetch('/components/header.html')
            .then(res => {
                if (!res.ok) throw new Error('Header not found');
                return res.text();
            })
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            })
            .catch(err => console.error("Header loading error:", err));
    </script>



</body>
</html>
