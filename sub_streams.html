<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Husbeat | Streams</title>

    <link href="./static/bootstrap.min.css" rel="stylesheet">
    <link href="./static/style.css" rel="stylesheet">
    <link href="./static/streaming.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="shortcut icon" href="./media/HusbeatHead.png">

</head>

<body class="subpage">

    <div id="header-placeholder"></div>

    <div class="site-wrapper">
        <div class="container my-5">
            <h3>Latest Content</h3>
            <div class="row">
                <div class="col-md-6 mb-4">
                    <h5>YouTube</h5>
                    <div class="ratio ratio-16x9 shadow-sm">                        
                        <iframe id="yt-latest"
                                src="https://www.youtube.com/embed/videoseries?list=UUWNKIQ8aKCzeD4Z6SYxOoyA"
                                title="YouTube video" allowfullscreen></iframe>
                    </div>
                </div>

                <div class="col-md-6 mb-4">
                    <h5>Twitch Live</h5>
                    <div class="ratio ratio-16x9 shadow-sm">
                        <iframe src="https://player.twitch.tv/?channel=Husbeat_Dj&parent=husbeat.com" allowfullscreen></iframe>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>

        const channelID = "UCWNKIQ8aKCzeD4Z6SYxOoyA";
        fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + channelID)}`)
            .then(response => response.json())
            .then(data => {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const videoId = xmlDoc.getElementsByTagName('yt:videoId')[0].textContent;
                if (videoId) {
                    document.getElementById('yt-latest').src = `https://www.youtube.com/embed/${videoId}?rel=0`;
                }
            })
            .catch(e => console.log("Using playlist fallback for YouTube"));

        fetch('/components/header.html')
            .then(res => res.text())
            .then(data => document.getElementById('header-placeholder').innerHTML = data);
    </script>



</body>
</html>
