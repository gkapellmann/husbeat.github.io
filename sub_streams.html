<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">

    <!-- Bootstrap core CSS -->
    <link href="./static/bootstrap.min.css" rel="stylesheet">

    <!-- Custom styles for this template -->
    <link href="./static/style.css" rel="stylesheet">
    <link href="./static/streaming.css" rel="stylesheet">

    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="shortcut icon" href="./media/HusbeatHead.png">

    <title> Husbeat | Lessons </title>

</head>

<body class="subpage">

    <!--Bootstrap JS (Ensure Bootstrap JavaScript is loaded)-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <div id="header-placeholder"></div>

    <div class="site-wrapper">

        <div class="container my-5">
            <h3>Latest Content</h3>
            <div class="row">
                <div class="col-md-6 mb-4">
                    <h5>YouTube</h5>
                    <div class="ratio ratio-16x9 shadow-sm">
                        <iframe id="yt-latest" src="" allowfullscreen></iframe>
                    </div>
                </div>

                <div class="col-md-6 mb-4">
                    <h5>Twitch Live</h5>
                    <div class="ratio ratio-16x9 shadow-sm">
                        <iframe src="https://player.twitch.tv/?channel=Husbeat_Dj&parent=husbeat.com" allowfullscreen></iframe>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Replace with your actual Channel ID (starts with UC)
        const channelID = "UCWNKIQ8aKCzeD4Z6SYxOoyA";
        const ytIframe = document.getElementById('yt-latest');

        // Fetching the latest video via a JSON proxy for the RSS feed
        fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + channelID)}`)
            .then(response => {
                if (response.ok) return response.json();
                throw new Error('Network response was not ok.');
            })
            .then(data => {
                // Parsing the XML string from the proxy
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const latestVideoId = xmlDoc.getElementsByTagName('yt:videoId')[0].textContent;

                console.log("Found Video ID:", latestVideoId);

                if (latestVideoId) {
                    ytIframe.src = `https://www.youtube.com/embed/${latestVideoId}?rel=0&autoplay=0`;
                }
            })
            .catch(err => {
                console.error("YouTube Fetch Error:", err);
                // Fallback: If the script fails, load the general uploads list
                // (Note: Replace the 'UC' with 'UU' in your ID for this fallback)
                const fallbackID = channelID.replace('UC', 'UU');
                ytIframe.src = `https://www.youtube.com/embed/videoseries?list=${fallbackID}`;
            });
    </script>

</body>
</html>
