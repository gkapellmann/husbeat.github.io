<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Husbeat DJ and Audio Equipment Rental in Trondheim">
    <title>Husbeat | Rentals</title>

    <link href="./static/bootstrap.min.css" rel="stylesheet">
    <link href="./static/style.css" rel="stylesheet">
    <link href="./static/rentals.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="shortcut icon" href="./media/HusbeatHead.png">
</head>

<body class="subpage">

    <div id="header-placeholder"></div>

    <div class="site-wrapper">
        <div class="site-wrapper-inner">
            <div class="cover-container px-3">

                <section class="text-center mt-5 mb-5">
                    <h1 class="cover-heading">Equipment Rental</h1>
                    <p class="lead">Professional gear for your next event in Trondheim.</p>
                </section>

                <nav class="rental-nav mb-5">
                    <ul id="dynamic-index" class="index_rent d-flex flex-wrap justify-content-center gap-5 list-unstyled">
                    </ul>
                </nav>

                <hr class="border-secondary opacity-25">

                <div id="rental-content">
                    <div class="text-center py-5">
                        <div class="spinner-border text-info" role="status">
                            <span class="visually-hidden">Loading gear catalog...</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-dark border-secondary shadow-lg">
                <div class="modal-body text-center p-0">
                    <img id="modalImage" src="" class="img-fluid rounded" alt="Zoomed gear view" />
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // 1. Load the Global Header
            fetch('/components/header.html')
                .then(res => res.text())
                .then(data => document.getElementById('header-placeholder').innerHTML = data)
                .catch(err => console.error("Header load error:", err));

            // 2. Define your desired Category Order and Titles
            const sectionOrder = [
                { id: "DJEq", title: "DJ" },
                { id: "Studio", title: "Studio" },
                { id: "Audio", title: "Audio" },
                { id: "Bundles", title: "Bundles" }
            ];

            // 3. Fetch Equipment Data
            fetch('/json/items.json')
                .then(res => res.json())
                .then(data => {
                    const indexContainer = document.getElementById('dynamic-index');
                    const mainContainer = document.getElementById('rental-content');

                    indexContainer.innerHTML = '';
                    mainContainer.innerHTML = '';

                    sectionOrder.forEach(section => {
                        const sectionItems = data.filter(item => item.category === section.id);

                        // SKIP section if no items exist in JSON
                        if (sectionItems.length === 0) return;

                        // --- A. BUILD THE TOP INDEX ---
                        const indexLi = document.createElement('li');
                        indexLi.className = "category_rent";

                        const subLinks = sectionItems.map(item =>
                            `<li><a href="#${item.id}" class="text-decoration-none">${item.name}</a></li>`
                        ).join('');

                        indexLi.innerHTML = `
                                    <a href="#${section.id}" class="fw-bold text-uppercase d-block mb-2">${section.title}</a>
                                    <ul class="list-unstyled small text-secondary">${subLinks}</ul>
                                `;
                        indexContainer.appendChild(indexLi);

                        // --- B. BUILD THE SECTION CONTENT ---
                        const header = document.createElement('h2');
                        header.id = section.id;
                        header.className = "text-start mt-5 mb-4 border-bottom border-secondary pb-2";
                        header.innerText = section.id === "Bundles" ? "Value Bundles" : `${section.title} Equipment`;
                        mainContainer.appendChild(header);

                        sectionItems.forEach(item => {
                            // Generate the "Includes" list HTML if it exists
                            const includesHTML = item.includes && item.includes.length > 0
                                ? `<ul class="small text-secondary mt-2">
                                        ${item.includes.map(inc => `<li>${inc}</li>`).join('')}
                                       </ul>`
                                : '';

                            let html = '';
                            if (item.type === 'bundle') {
                                html = `
                                    <div id="${item.id}" class="bundle-row-special align-items-center mb-5 border-bottom border-secondary pb-4">
                                        <div class="col-md-5 col-sm-12">
                                            <div class="bundle-gallery-grid">
                                                ${item.images.map(img => `
                                                    <div class="bundle-gallery-item">
                                                        <img src="${img}" class="img-fluid stylish-image rounded border border-secondary"
                                                             data-bs-toggle="modal" data-bs-target="#imageModal">
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                        <div class="col-md-7 col-sm-12 text-start px-md-5 mt-4 mt-md-0">
                                            <span class="badge bg-info text-dark mb-2 px-3 py-1 text-uppercase fw-bold">Value Bundle</span>
                                            <h3 class="mb-1 text-white">${item.name}</h3>
                                            <p class="text-secondary small mb-2">${item.brand}</p>
                                            <p class="text-light mb-0">${item.description}</p>

                                            ${includesHTML} <p class="text-info fw-bold mt-3 h4">${item.price} / Day</p>
                                        </div>
                                    </div>`;
                            } else {
                                html = `
                                    <dl id="${item.id}" class="row align-items-center mb-5 border-bottom border-secondary pb-4">
                                        <dt class="col-md-3">
                                            <img src="${item.images[0]}" class="img-fluid stylish-image rounded shadow-sm border border-secondary"
                                                 data-bs-toggle="modal" data-bs-target="#imageModal">
                                        </dt>
                                        <dd class="col-md-9 text-start">
                                            <h3 class="mb-1">${item.name}</h3>
                                            <p class="text-secondary small mb-1">${item.brand}</p>
                                            <p class="mb-0">${item.description}</p>

                                            ${includesHTML} <p class="text-info fw-bold mt-3 h5">${item.price} / 24 Hrs.</p>
                                        </dd>
                                    </dl>`;
                            }
                            mainContainer.insertAdjacentHTML('beforeend', html);
                        });

                    });
                })
                .catch(err => {
                    console.error("Data Load Error:", err);
                    document.getElementById('rental-content').innerHTML = `<p class="text-danger">Error loading equipment. Check console.</p>`;
                });

            // 4. Global Image Modal Logic (Works for dynamic elements)
            document.addEventListener("click", function (e) {
                if (e.target.classList.contains("stylish-image")) {
                    document.getElementById("modalImage").src = e.target.src;
                }
            });
        });
    </script>

</body>
</html>
